# nginx config for Image Compress.
# Place at /etc/nginx/sites-available/image-compress and symlink to sites-enabled,
# then run `sudo nginx -t && sudo systemctl reload nginx`.
#
# Get a free Let's Encrypt cert with certbot:
#   sudo apt install certbot python3-certbot-nginx
#   sudo certbot --nginx -d your-domain.example
# (certbot will modify the server block to add SSL automatically)
#
# Replace your-domain.example with your real domain.

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.example;

    # certbot will replace this with HTTPS redirect after running.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name your-domain.example;

    root /var/www/image-compress;
    index index.html;

    # ssl_certificate / ssl_certificate_key are added by certbot.

    # Required for SharedArrayBuffer → multi-threaded AVIF encoder (~3× faster).
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml application/wasm;
    gzip_min_length 1024;
    gzip_proxied any;

    # Vite hashes asset filenames — cache them aggressively.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # Don't cache the entry HTML or the manifest.
    location = /index.html {
        add_header Cache-Control "public, max-age=0, must-revalidate";
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # WASM files need correct MIME type.
    types {
        application/wasm wasm;
    }

    # SPA fallback (we have one route, but doesn't hurt).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Block access to dotfiles.
    location ~ /\. {
        deny all;
    }
}
